<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>E+B Arts & Crafts</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon_small.png">
  <link rel="icon" type="image/png" sizes="256x256" href="assets/images/favicon_big.png">
  <link rel="apple-touch-icon" href="assets/images/favicon_big.png">
  <link href="https://fonts.googleapis.com/css2?family=Krona+One&display=swap" rel="stylesheet">
  <style>
    :root {
      --orange: #e8610a;
      --yellow-bg: #f7ad40;
      --charcoal: #1c1714;
      --sand: #fbf4e6;
      --bark: #3d2e1f;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: var(--yellow-bg);
      color: var(--charcoal);
      font-family: "Krona One", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 320px;
      width: 100%;
    }
    .logo {
      width: 120px;
      height: auto;
      margin-bottom: 2.5rem;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .link-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 1rem 1.5rem;
      background: var(--sand);
      color: var(--bark);
      text-decoration: none;
      border-radius: 50px;
      font-size: 0.85rem;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .link-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }
    .link-btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="assets/images/logo.png" alt="E+B Arts & Crafts" class="logo">
    <div class="links">
      <a href="https://eandbarts.com" class="link-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="2" y1="12" x2="22" y2="12"></line>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
        </svg>
        Website
      </a>
      <a href="https://www.instagram.com/eandbarts" target="_blank" rel="noopener" class="link-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
          <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
          <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
        </svg>
        Instagram
      </a>
    </div>
  </div>
</body>
</html>
